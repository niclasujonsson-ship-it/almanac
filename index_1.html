    var ds=(e.endDate&&e.endDate!==e.startDate)?fmtDate(e.startDate,true)+' – '+fmtDate(e.endDate,true)+' · '+numNights(e.startDate,e.endDate)+' nights':fmtDate(e.startDate);
    var cnt=d===0?'<div class="ecnt" style="font-size:28px">Today</div>':'<div class="ecnt">'+d+'</div><div class="eunt">days away</div>';
    h+='<div class="ecard '+typeCls(e.type)+'" data-evid="'+e.id+'"><div class="etop"><div><div class="etyp">'+typeLbl(e.type)+ws+'</div><div class="enam">'+esc(e.title)+'</div></div><div>'+cnt+'</div></div><div class="edts">'+ds+'</div><div class="etgs">'+fT+sT+cT+'<a class="gcal" href="'+gcalUrl(e)+'" target="_blank" data-gcal="1">📅 GCal</a></div></div>';
  });if(up.length>2){h+='<div style="font-size:12px;color:var(--mu);margin-top:10px;padding:2px 4px">… and '+(up.length-2)+' more — see Trips &amp; Vacations for the full list.</div>';}h+='</div>';}
  h+='</div>';
  var kidLbl=kids.length===1?kids[0]+'\'s Next Sleepover':'Next Sleepover';
  h+='<div class="sec"><div class="slbl">'+kidLbl+'</div>';

  else{var s0=nb[0],d0=daysDiff(s0.date),ds0=d0===0?'Tonight!':d0===1?'Tomorrow':'In '+d0+' days';h+='<div class="bnxt" id="go-bodhi"><div class="bico">◐</div><div><div class="bnam">'+esc(s0.host||'Sleepover')+'</div><div class="bdat">'+fmtDate(s0.date)+' · '+ds0+'</div>'+(!s0.confirmed?'<div class="bwrn">⚠ Not confirmed</div>':'')+(s0.notes?'<div style="font-size:11px;color:var(--mu);margin-top:5px">'+esc(s0.notes)+'</div>':'')+'</div></div>';}
  h+='</div>';
  if(nudg.length){h+='<div class="sec"><div class="slbl">Still to Plan</div><div class="ngrid">';nudg.forEach(function(n){var d=daysDiff(n.date);h+='<div class="nchp" data-nudge="1"><div class="nem">'+n.emoji+'</div><div class="nlbl">'+esc(n.label)+'</div><div class="ndys">'+(d>0?'in '+d+'d':d===0?'today':'passed')+'</div></div>';});h+='</div></div>';}
  if(adults.length){h+='<div class="sec"><div class="slbl">Vacation Days</div><div style="background:var(--card);border:1px solid var(--bdr);border-radius:14px;display:inline-block"><div class="rrow">';adults.forEach(function(a,i){var used=state.events.reduce(function(s,e){return s+(Number((e.vacDays||{})[a])||0);},0);var budget=state.budget[a]||25;var color=ADULT_COLORS[i%ADULT_COLORS.length];h+='<div class="rhalf"'+(i>0?' style="border-left:1px solid var(--bdr)"':'')+'>'+ring(used,budget,color)+'<div class="rnam">'+esc(a)+'</div><div class="rrem">'+(budget-used)+' days left</div></div>';});h+='</div></div></div>';}
  var el=document.getElementById('v-home');el.innerHTML=h;
  el.querySelectorAll('[data-evid]').forEach(function(node){node.addEventListener('click',function(ev){if(ev.target.dataset.gcal)return;openEv(this.dataset.evid);});});
  var gb=el.querySelector('#go-bodhi');if(gb)gb.addEventListener('click',function(){go('bodhi');});
  var sb=el.querySelector('#setup-btn');if(sb)sb.addEventListener('click',function(){go('settings');});

}
function rEvList(cid,filterFn,eico,emsg){
  var sorted=state.events.filter(filterFn).sort(function(a,b){return a.startDate.localeCompare(b.startDate);});
  var container=document.getElementById(cid);
  if(!sorted.length){container.innerHTML='<div class="empty"><div class="emico">'+eico+'</div><div class="emtx">'+emsg+'</div></div>';return;}
  var bm={};sorted.forEach(function(e){var m=e.startDate.slice(0,7);if(!bm[m])bm[m]=[];bm[m].push(e);});var h='';
  Object.keys(bm).sort().forEach(function(m){h+='<div class="mgrp"><div class="mhd">'+new Date(m+'-02').toLocaleDateString('en-GB',{month:'long',year:'numeric'})+'</div><div class="lgrid">';
    bm[m].forEach(function(e){var p=isPast(e);
      var ds=(e.endDate&&e.endDate!==e.startDate)?fmtDate(e.startDate,true)+' – '+fmtDate(e.endDate,true)+' · '+numNights(e.startDate,e.endDate)+'d':fmtDate(e.startDate);
      var tgs='';
      if(e.type!=='work'&&e.type!=='party'){tgs+='<span class="mtg '+(e.bookedFlights?'tok':'tno')+'">'+(e.bookedFlights?'✓':'✕')+' Flights</span>';tgs+='<span class="mtg '+(e.bookedAccommodation?'tok':'tno')+'">'+(e.bookedAccommodation?'✓':'✕')+' Stay</span>';}
      if(e.cost>0)tgs+='<span class="mtg tco">€'+Number(e.cost).toLocaleString()+'</span>';
      var vd=e.vacDays||{};var dp=Object.keys(vd).filter(function(a){return vd[a]>0;}).map(function(a){return a.split(' ')[0]+':'+vd[a]+'d';}).join(' · ');if(dp)tgs+='<span class="mtg twh">'+dp+'</span>';
      var wl=whoLbl(e.who);if(wl)tgs+='<span class="mtg twh">'+esc(wl)+'</span>';
      if(p)tgs+='<span class="mtg tpa">past</span>';
      tgs+='<a class="gcal" href="'+gcalUrl(e)+'" target="_blank" data-gcal="1">📅 GCal</a>';
      h+='<div class="lev" style="'+(p?'opacity:.38':'')+'"><div class="lico '+dotCls(e.type)+'">'+typeIco(e.type)+'</div><div class="lbdy"><div class="ltit">'+esc(e.title)+'</div><div class="lmet">'+ds+'</div>'+(e.notes?'<div class="lmet" style="font-style:italic">'+esc(e.notes)+'</div>':'')+'<div class="ltgs">'+tgs+'</div></div><div class="lact"><button class="ibtn" data-evid="'+e.id+'" data-action="edit">✎</button><button class="ibtn del" data-evid="'+e.id+'" data-action="del">✕</button></div></div>';
    });h+='</div></div>';});
  container.innerHTML=h;
  container.querySelectorAll('[data-evid]').forEach(function(btn){btn.addEventListener('click',function(ev){ev.stopPropagation();if(ev.target.dataset.gcal)return;if(this.dataset.action==='del')delEvById(this.dataset.evid);else openEv(this.dataset.evid);});});
}
function rTrips(){rEvList('v-trips',function(e){return e.type!=='work'&&e.type!=='party';},'✦','No trips yet.');}
function rWork(){rEvList('v-work',function(e){return e.type==='work';},'◆','No work trips yet.');}
function rParty(){rEvList('v-party',function(e){return e.type==='party';},'★','No parties yet. Time to plan one.');}
function rBodhi(){var kids=state.family.kids||[];var sorted=state.sleepovers.slice().sort(function(a,b){return a.date.localeCompare(b.date);});var container=document.getElementById('v-bodhi');var kidLbl=kids.length===1?kids[0]:'a kid';var h='<div style="background:rgba(123,94,167,.10);border:1px solid rgba(123,94,167,.18);border-radius:12px;padding:14px 18px;margin-bottom:26px;font-size:13px;color:var(--mu);line-height:1.8;max-width:560px">Track when '+kidLbl+' sleeps away so you know you have a night for yourselves.</div>';if(!sorted.length){h+='<div class="empty"><div class="emico">◐</div><div class="emtx">No sleepovers yet.</div></div>';}else{h+='<div class="blist">';sorted.forEach(function(s){var d=daysDiff(s.date),p=d<0,ds2=p?'Past':d===0?'Tonight':d===1?'Tomorrow':'In '+d+' days';h+='<div class="brow '+(s.confirmed?'cfm':'')+' '+(p?'past':'')+'"><div style="font-size:22px;flex-shrink:0">◐</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:15px;color:var(--cr)">'+esc(s.host||'Sleepover')+'</div><div style="font-size:12px;color:var(--mu);margin-top:2px">'+fmtDate(s.date)+' · '+ds2+'</div><div style="margin-top:7px"><span class="spil '+(s.confirmed?'sok':'sno')+'">'+(s.confirmed?'✓ Confirmed':'⚠ Not confirmed')+'</span></div>'+(s.notes?'<div style="font-size:11px;color:var(--mu);margin-top:6px">'+esc(s.notes)+'</div>':'')+'</div><div class="lact"><button class="ibtn" data-boid="'+s.id+'" data-action="edit">✎</button><button class="ibtn del" data-boid="'+s.id+'" data-action="del">✕</button></div></div>';});h+='</div>';}container.innerHTML=h;container.querySelectorAll('[data-boid]').forEach(function(btn){btn.addEventListener('click',function(ev){ev.stopPropagation();if(this.dataset.action==='del')delBoById(this.dataset.boid);else openBo(this.dataset.boid);});});}
function rSettings(){
  var adults=state.family.adults||[],kids=state.family.kids||[],spdates=state.family.specialDates||[];var h='';
  h+='<div class="scard" style="margin-bottom:20px"><div class="stit">Who is this Almanac for?</div><div style="font-size:12px;color:var(--mu);margin-bottom:20px;line-height:1.8">Add the adults and kids in your family. Their names appear throughout the app.</div><div class="frow" style="gap:24px">';
  h+='<div><label class="flbl">Adults</label><div class="pills-row">';adults.forEach(function(a,i){h+='<span class="fpill">'+esc(a)+'<button class="pill-del" data-type="adult" data-idx="'+i+'">✕</button></span>';});h+='</div><div class="pill-add-row"><input type="text" id="add-adult-inp" placeholder="Add adult..."><button class="btns" id="add-adult-btn" style="white-space:nowrap">+ Add</button></div></div>';
  h+='<div><label class="flbl">Kids</label><div class="pills-row">';kids.forEach(function(k,i){h+='<span class="fpill">'+esc(k)+'<button class="pill-del" data-type="kid" data-idx="'+i+'">✕</button></span>';});h+='</div><div class="pill-add-row"><input type="text" id="add-kid-inp" placeholder="Add kid..."><button class="btns" id="add-kid-btn" style="white-space:nowrap">+ Add</button></div></div>';
  h+='</div></div>';
  h+='<div class="scard" style="margin-bottom:20px"><div class="stit">Special Dates</div><div style="font-size:12px;color:var(--mu);margin-bottom:20px;line-height:1.8">Dates to plan around — anniversaries, birthdays, school breaks, family traditions.</div>';
  if(spdates.length){spdates.forEach(function(sp){h+='<div class="spdate-row"><span class="spdate-em">'+sp.emoji+'</span><span class="spdate-lbl">'+esc(sp.label)+'</span><span class="spdate-dt">'+fmtDate(sp.date,true)+'</span><button class="ibtn del" style="margin-left:auto" data-spid="'+sp.id+'">✕</button></div>';});}
  else{h+='<div style="font-size:13px;color:var(--mu);padding:8px 0 16px">No special dates yet.</div>';}
  h+='<div id="sp-add-form" style="display:none;margin-top:12px;padding:16px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--bdr)"><div class="frow fgrp" style="gap:10px"><div style="max-width:72px"><label class="flbl">Emoji</label><input type="text" id="sp-emoji" placeholder="📅" maxlength="2" style="text-align:center;font-size:18px"></div><div style="flex:2"><label class="flbl">Label</label><input type="text" id="sp-label" placeholder="Anniversary"></div><div style="flex:1"><label class="flbl">Date</label><input type="date" id="sp-date"></div></div><div style="display:flex;gap:8px"><button class="savebtn" id="sp-save-btn" style="width:auto;padding:9px 20px;font-size:13px">Add date</button><button class="btns" id="sp-cancel-btn" style="font-size:12px">Cancel</button></div></div><button class="btns" id="sp-add-btn" style="margin-top:14px;font-size:12px">+ Add a date</button></div>';
  h+='<div class="scard" style="margin-bottom:20px"><div class="stit">Colour Theme</div><div class="theme-swatches">';THEMES.forEach(function(t){h+='<div class="tswatch-wrap"><div class="tswatch'+(state.theme===t.key?' active':'')+' " data-theme="'+t.key+'" style="background:'+t.bg+'"><div class="tswatch-inner" style="background:'+t.accent+'"></div></div><div class="tswatch-lbl">'+t.label+'</div></div>';});h+='</div></div>';
  h+='<div class="scard"><div class="stit">Vacation Day Budget</div>';
  if(!adults.length){h+='<div style="font-size:13px;color:var(--mu)">Add adults above to set their vacation day budget.</div>';}
  else{h+='<div class="frow fgrp">';adults.forEach(function(a){h+='<div><label class="flbl">'+esc(a)+' — days / year</label><input type="number" class="budget-inp" data-adult="'+esc(a)+'" value="'+(state.budget[a]||25)+'" min="0" max="365"></div>';});h+='</div>';var usedStr=adults.map(function(a){var u=state.events.reduce(function(s,e){return s+(Number((e.vacDays||{})[a])||0);},0);return esc(a)+': <strong style="color:var(--cr2)">'+u+'d</strong>';}).join(' &nbsp;·&nbsp; ');h+='<div style="font-size:12px;color:var(--mu);margin-bottom:18px">Logged: '+usedStr+'</div><button class="savebtn" id="budget-savebtn" style="width:auto;padding:11px 28px">Save Budget</button>';}
  h+='</div>';
  var el=document.getElementById('v-settings');el.innerHTML=h;
  el.querySelectorAll('.pill-del').forEach(function(btn){btn.addEventListener('click',function(){var t=this.dataset.type,i=Number(this.dataset.idx);if(t==='adult')state.family.adults.splice(i,1);else state.family.kids.splice(i,1);save();updateSidebarLabels();rSettings();});});
  var aab=el.querySelector('#add-adult-btn');if(aab)aab.addEventListener('click',function(){var v=document.getElementById('add-adult-inp').value.trim();if(!v)return;state.family.adults.push(v);if(!state.budget[v])state.budget[v]=25;save();updateSidebarLabels();rSettings();});
  var addinp=el.querySelector('#add-adult-inp');if(addinp)addinp.addEventListener('keydown',function(e){if(e.key==='Enter')el.querySelector('#add-adult-btn').click();});
  var akb=el.querySelector('#add-kid-btn');if(akb)akb.addEventListener('click',function(){var v=document.getElementById('add-kid-inp').value.trim();if(!v)return;state.family.kids.push(v);save();updateSidebarLabels();rSettings();});
  var kidinp=el.querySelector('#add-kid-inp');if(kidinp)kidinp.addEventListener('keydown',function(e){if(e.key==='Enter')el.querySelector('#add-kid-btn').click();});
  el.querySelectorAll('[data-spid]').forEach(function(btn){btn.addEventListener('click',function(){state.family.specialDates=state.family.specialDates.filter(function(s){return s.id!==this.dataset.spid;},this);save();rSettings();});});
  var spAdd=el.querySelector('#sp-add-btn');if(spAdd)spAdd.addEventListener('click',function(){document.getElementById('sp-add-form').style.display='block';this.style.display='none';});
  var spCancel=el.querySelector('#sp-cancel-btn');if(spCancel)spCancel.addEventListener('click',function(){document.getElementById('sp-add-form').style.display='none';document.getElementById('sp-add-btn').style.display='';});
  var spSave=el.querySelector('#sp-save-btn');if(spSave)spSave.addEventListener('click',function(){var lbl=document.getElementById('sp-label').value.trim(),dt=document.getElementById('sp-date').value,em=document.getElementById('sp-emoji').value.trim()||'📅';if(!lbl||!dt)return;state.family.specialDates.push({id:uid(),label:lbl,date:dt,emoji:em});save();rSettings();});
  el.querySelectorAll('.tswatch-wrap').forEach(function(wrap){wrap.addEventListener('click',function(){var sw=this.querySelector('.tswatch');if(sw)applyThemeAndSave(sw.dataset.theme);});});
  var bsb=el.querySelector('#budget-savebtn');if(bsb)bsb.addEventListener('click',function(){el.querySelectorAll('.budget-inp').forEach(function(inp){state.budget[inp.dataset.adult]=Number(inp.value)||0;});save();bsb.textContent='Saved ✓';bsb.style.opacity='.65';setTimeout(function(){bsb.textContent='Save Budget';bsb.style.opacity='1';},2000);});
}
function rAll(){if(curTab==='home')rHome();else if(curTab==='trips')rTrips();else if(curTab==='work')rWork();else if(curTab==='party')rParty();else if(curTab==='bodhi')rBodhi();else if(curTab==='settings')rSettings();}
function populateWhoSelect(val){var adults=state.family.adults||[];var sel=document.getElementById('ev-who');sel.innerHTML='<option value="all">Everyone</option>'+adults.map(function(a){return '<option value="'+esc(a)+'">'+esc(a)+' only</option>';}).join('');sel.value=(val&&val!=='all'&&adults.indexOf(val)>=0)?val:'all';}
function populateVacDays(ev){var adults=state.family.adults||[];var vd=(ev&&ev.vacDays)||{};var container=document.getElementById('ev-vacdays-container');if(!adults.length){container.innerHTML='<div style="font-size:12px;color:var(--mu);padding:4px 0">Add adults in Settings to track vacation days.</div>';return;}container.innerHTML=adults.map(function(a,i){return '<div><label class="flbl" style="color:'+ADULT_COLORS[i%ADULT_COLORS.length]+'">Days '+esc(a)+'</label><input type="number" class="ev-vd" data-adult="'+esc(a)+'" value="'+(vd[a]||'')+' " placeholder="0" min="0"></div>';}).join('');}
function collectVacDays(){var vd={};document.querySelectorAll('.ev-vd').forEach(function(inp){var n=Number(inp.value)||0;if(n>0)vd[inp.dataset.adult]=n;});return vd;}
function openEv(idOrNull,defaultType){var ev=(idOrNull&&idOrNull!='null')?evMap[idOrNull]:null;editEvId=ev?ev.id:null;document.getElementById('ev-modal-title').textContent=ev?'Edit Event':'New Event';document.getElementById('ev-title').value=ev?ev.title:'';document.getElementById('ev-type').value=ev?ev.type:(defaultType||'trip');document.getElementById('ev-start').value=ev?ev.startDate:todayStr();document.getElementById('ev-end').value=ev?(ev.endDate||''):'';document.getElementById('ev-cost').value=(ev&&ev.cost>0)?ev.cost:'';document.getElementById('ev-notes').value=ev?(ev.notes||''):'';populateWhoSelect(ev?ev.who:'all');populateVacDays(ev);sck('ck-fl',ev?ev.bookedFlights:false);sck('ck-st',ev?ev.bookedAccommodation:false);document.getElementById('ev-delbtn').style.display=ev?'block':'none';document.getElementById('ev-modal').classList.add('on');}
function saveEv(){var title=document.getElementById('ev-title').value.trim(),start=document.getElementById('ev-start').value;if(!title||!start){alert('Please enter a title and start date.');return;}var ev={id:editEvId||uid(),title:title,type:document.getElementById('ev-type').value,who:document.getElementById('ev-who').value,startDate:start,endDate:document.getElementById('ev-end').value||start,bookedFlights:ckv['ck-fl'],bookedAccommodation:ckv['ck-st'],cost:Number(document.getElementById('ev-cost').value)||0,vacDays:collectVacDays(),notes:document.getElementById('ev-notes').value.trim()};if(editEvId){state.events=state.events.map(function(e){return e.id===editEvId?ev:e;});}else{state.events.push(ev);}save();indexEvents();closeModal('ev-modal');rAll();}
function delEvById(id){if(!confirm('Delete this event?'))return;state.events=state.events.filter(function(e){return e.id!==id;});save();indexEvents();rAll();}
function delEvModal(){if(!editEvId||!confirm('Delete this event?'))return;state.events=state.events.filter(function(e){return e.id!==editEvId;});save();indexEvents();closeModal('ev-modal');rAll();}
function openBo(idOrNull){var s=(idOrNull&&idOrNull!='null')?boMap[idOrNull]:null;editBoId=s?s.id:null;document.getElementById('bo-modal-title').textContent=s?'Edit Sleepover':'New Sleepover';document.getElementById('bo-date').value=s?s.date:todayStr();document.getElementById('bo-host').value=s?(s.host||''):'';document.getElementById('bo-notes').value=s?(s.notes||''):'';sck('ck-cf',s?s.confirmed:false);document.getElementById('bo-modal').classList.add('on');}
function saveBo(){var date=document.getElementById('bo-date').value;if(!date)return;var s={id:editBoId||uid(),date:date,host:document.getElementById('bo-host').value.trim(),confirmed:ckv['ck-cf'],notes:document.getElementById('bo-notes').value.trim()};if(editBoId){state.sleepovers=state.sleepovers.map(function(x){return x.id===editBoId?s:x;});}else{state.sleepovers.push(s);}save();indexBodhi();closeModal('bo-modal');rAll();}
function delBoById(id){if(!confirm('Delete?'))return;state.sleepovers=state.sleepovers.filter(function(s){return s.id!==id;});save();indexBodhi();rAll();}
function closeModal(id){document.getElementById(id).classList.remove('on');}
function showLogin(){document.getElementById('login-screen').style.display='flex';document.getElementById('app-shell').style.display='none';}
function showApp(user){document.getElementById('login-screen').style.display='none';var ud=document.getElementById('user-display');if(ud)ud.textContent=user.displayName||user.email||'';}
function setLoginError(msg){var el=document.getElementById('login-error');if(el)el.textContent=msg;}
document.querySelectorAll('.moverlay').forEach(function(m){m.addEventListener('click',function(e){if(e.target===m)m.classList.remove('on');});});
document.addEventListener('keydown',function(e){if(e.key==='Escape')document.querySelectorAll('.moverlay.on').forEach(function(m){m.classList.remove('on');});});
document.getElementById('ev-savebtn').addEventListener('click',saveEv);
document.getElementById('ev-delbtn').addEventListener('click',delEvModal);
document.getElementById('bo-savebtn').addEventListener('click',saveBo);
['ck-fl','ck-st','ck-cf'].forEach(function(id){document.getElementById(id).parentElement.addEventListener('click',function(){tck(id);});});
document.querySelectorAll('.navi').forEach(function(n){n.addEventListener('click',function(){go(this.dataset.tab);});});
document.querySelectorAll('.mclose').forEach(function(btn){btn.addEventListener('click',function(){closeModal(this.dataset.modal);});});
document.getElementById('google-btn').addEventListener('click',function(){setLoginError('');auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(function(e){setLoginError(e.message);});});
document.getElementById('signin-btn').addEventListener('click',function(){var em=document.getElementById('login-email').value.trim(),pw=document.getElementById('login-password').value;if(!em||!pw){setLoginError('Please enter email and password.');return;}setLoginError('');auth.signInWithEmailAndPassword(em,pw).catch(function(e){setLoginError(e.message);});});
document.getElementById('signup-btn').addEventListener('click',function(){var em=document.getElementById('login-email').value.trim(),pw=document.getElementById('login-password').value;if(!em||!pw){setLoginError('Please enter email and password.');return;}if(pw.length<6){setLoginError('Password must be at least 6 characters.');return;}setLoginError('');auth.createUserWithEmailAndPassword(em,pw).catch(function(e){setLoginError(e.message);});});
document.getElementById('login-password').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('signin-btn').click();});
document.getElementById('logout-btn').addEventListener('click',function(){auth.signOut();});
if(FIREBASE_OK&&auth){
auth.onAuthStateChanged(function(user){
  if(user){currentUser=user;showApp(user);loadFromFirestore();}
  else{currentUser=null;state=defaultState();showLogin();}
});
}else{state=loadLocal();document.getElementById('login-screen').style.display='none';afterLoad();}


</script>
